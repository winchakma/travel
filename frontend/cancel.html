<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Cancelled - GoTrip</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { background: #f4f6fa; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    .success-card { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; max-width: 400px; }
    .icon { font-size: 64px; margin-bottom: 20px; }
    h1 { color: #1a2b6b; margin-bottom: 10px; }
    p { color: #666; margin-bottom: 30px; line-height: 1.5; }
    .btn { background: #e5c414; color: #1a2b6b; padding: 12px 24px; border-radius: 8px; text-decoration: none; font-weight: 600; border: none; cursor: pointer; display: inline-block; }
  </style>
</head>
<body>
  <div class="success-card">
    <div class="icon">❌</div>
    <h1>Payment Cancelled</h1>
    <p>Your payment was cancelled and your booking has not been confirmed. You have not been charged.</p>
    <a href="index.html" class="btn">Return Home</a>
  </div>
</body>
</html>
